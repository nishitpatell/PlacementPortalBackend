events{}

http{
    # Rate limiting configuration
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/m;

    # to just see the load balancing output(response from api1, api2, api1, api2, api1.....), comment out all the lines that says cache
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m use_temp_path=off;

    upstream backend_api {
        server api1:8000;
        server api2:8000;
    }

    server {
        listen 80;
        listen [::]:80;

        location / {
            # apply the rate limit
            limit_req zone=api_limit burst=25 nodelay;

            # enable caching
            proxy_cache api_cache;
            proxy_cache_valid 200 1m;

            # resilienceL server stale cache if backend is down or times out
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

            # debugging: Expose cache status to client in response headers
            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass http://backend_api;
        }
    }
}